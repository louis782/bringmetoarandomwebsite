<script>
    (async () => {
        try {
            // Target URL must be encoded and appended to the proxy prefix
            const targetUrl = encodeURIComponent("https://example.com");
            const proxyUrl = `https://corsproxy.io{targetUrl}`;

            const response = await fetch(proxyUrl, { method: 'HEAD' });
            console.log(response.ok); // Outputs: true
        } catch (error) {
            console.log("Failed to check URL:", error);
        }
    })();
</script>
