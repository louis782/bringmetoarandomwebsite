<h1>Bring to a random website im boorrrred</h1>
<small>
    Go to this link to get access for proxy thingy:
    <a href="https://cors-anywhere.herokuapp.com/corsdemo" target="_blank">https://cors-anywhere.herokuapp.com/</a><p>
    <small>(It is needed to check if a website exists)</small>
</small>
<hr>
Random URL length 
<input type="checkbox" id="randomcharnum" checked>
<p id="scoreskin">
Length
<input type="range" min="3" max="20" id="maxchar" value='5' style="width: 100px;"> 
<small id="maxcharnum">5</small>
</p>
Random Domain suffix  
<input type="checkbox" id="rds" checked>
<p id="scoreskin2">
<select id="ds">
    <option>.com</option>
    <option>.edu</option>
    <option>.io</option>
    <option>.gov</option>
    <option>.org</option>
    <option>.ai</option>
    <option>.me</option>
    <option>.net</option>
    <option>.info</option>
</select>
</p>
<p>
<button onclick="findweb()">
    Im feeling lucky! 
</button>
<p><small id = "info"></small></p>

<script>
    let info = document.getElementById("info")
    let slider = document.getElementById("maxchar")
    let maxcharnum = document.getElementById("maxcharnum")
    let randomcharnum = document.getElementById("randomcharnum")
    let rds =  document.getElementById("rds")
    let ds = document.getElementById("ds")
    let scoreskin = document.getElementById("scoreskin")
    let scoreskin2 = document.getElementById("scoreskin2")

    setInterval(() => {
        maxcharnum.innerHTML = slider.value
        if (randomcharnum.checked){
            scoreskin.style = "opacity: 0.25"
        }else{
            scoreskin.style = "opacity: 1"
        }

        if (rds.checked){
            scoreskin2.style = "opacity: 0.25"
        }else{
            scoreskin2.style = "opacity: 1"
        }
        
    }, 10)

    async function checkurl(url) {
        try {
            const proxyUrl = `https://cors-anywhere.herokuapp.com/${url}`;
            const response = await fetch(proxyUrl, { method: 'HEAD' });
            return response.ok
        } catch (error) {
            console.log("Failed to check URL:", error);
        }
    }
    function generateRandomString() {
    const min = 3;
    const max = 20;
    let length = Math.floor(Math.random() * (max - min + 1)) + min;

    if(!randomcharnum.checked){
        length = parseInt(slider.value)
    }
    
    const characters = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ01233456789';
    const dss = [
        ".com",
        ".edu",
        ".io",
        ".gov",
        ".org",
        ".ai",
        ".me",
        ".net",
        ".info"
    ]
    let result = '';
    let dsr = dss[Math.floor(Math.random() * dss.length)]

    if(!rds.checked){
        dsr = ds.value
    }

    for (let i = 0; i < length; i++) {
        const randomIndex = Math.floor(Math.random() * characters.length);
        result += characters.charAt(randomIndex);
    }
    
    return result + dsr;
}

    async function findweb() {
        var found = false;
        var link = "";
        
        while (!found) {
            link = "https://www." + generateRandomString();
            
            console.log("Testing: " + link + "&#x274C;");
            info.innerHTML = "Testing: " + link + "&#x274C;"
            
            var exists = await checkurl(link); 
            
            if (exists) {
                found = true;
            }
        }
        
        info.innerHTML = "Found: " + link + "&#9989;"

        setTimeout(() => {
            window.open(link, '_blank');
        }, 1000)
    }
</script>
